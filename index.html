<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ambag of Hope — Donation Records</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
--green-deep: #0d4a2f;
--green-mid: #1a7a4a;
--green-light: #2fb370;
--green-pale: #e8f7ef;
--green-mist: #f4fbf7;
--gold: #c8962a;
--gold-light: #f5e8c8;
--text-dark: #0f2018;
--text-mid: #3a5542;
--text-soft: #7a9e88;
--border: #d0e8d8;
--white: #ffffff;
--shadow: 0 2px 24px rgba(13,74,47,0.10);
}

body {
font-family: 'DM Sans', sans-serif;
background: var(--green-mist);
color: var(--text-dark);
min-height: 100vh;
}

/* HERO HEADER */
.hero {
background: var(--green-deep);
padding: 3rem 2rem 2.5rem;
text-align: center;
position: relative;
overflow: hidden;
}
.hero::before {
content: '';
position: absolute;
inset: 0;
background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(47,179,112,0.18) 0%, transparent 70%);
pointer-events: none;
}
.hero-icon {
width: 64px; height: 64px;
background: var(--green-light);
border-radius: 50%;
display: flex; align-items: center; justify-content: center;
margin: 0 auto 1rem;
font-size: 28px;
box-shadow: 0 0 0 10px rgba(47,179,112,0.15);
}
.hero h1 {
font-family: 'Playfair Display', serif;
font-size: clamp(2rem, 5vw, 2.8rem);
font-weight: 600;
color: var(--white);
letter-spacing: -0.01em;
line-height: 1.15;
}
.hero p {
margin-top: 0.5rem;
font-size: 0.95rem;
color: rgba(255,255,255,0.55);
font-weight: 300;
letter-spacing: 0.06em;
text-transform: uppercase;
}
.hero-divider {
width: 48px; height: 2px;
background: var(--green-light);
margin: 1.2rem auto 0;
border-radius: 2px;
}

/* MAIN CONTENT */
.container {
max-width: 1100px;
margin: 0 auto;
padding: 2rem 1.5rem;
}

/* STATS */
.stats-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
gap: 1rem;
margin-bottom: 2rem;
animation: fadeUp 0.5s ease both;
}
.stat-card {
background: var(--white);
border: 1px solid var(--border);
border-radius: 14px;
padding: 1.25rem 1.4rem;
position: relative;
overflow: hidden;
}
.stat-card::after {
content: '';
position: absolute;
bottom: 0; left: 0; right: 0;
height: 3px;
background: var(--green-light);
border-radius: 0 0 14px 14px;
opacity: 0.4;
}
.stat-card.highlight::after { opacity: 1; background: var(--gold); }
.stat-label {
font-size: 0.72rem;
font-weight: 500;
letter-spacing: 0.08em;
text-transform: uppercase;
color: var(--text-soft);
margin-bottom: 0.5rem;
}
.stat-value {
font-family: 'Playfair Display', serif;
font-size: 1.9rem;
font-weight: 600;
color: var(--green-deep);
line-height: 1;
}
.stat-card.highlight .stat-value { color: var(--gold); }

/* CONTROLS */
.controls-bar {
display: flex;
flex-wrap: wrap;
gap: 0.75rem;
margin-bottom: 1.25rem;
align-items: center;
animation: fadeUp 0.6s ease both;
}
.search-wrap {
flex: 1;
min-width: 200px;
position: relative;
}
.search-wrap svg {
position: absolute;
left: 12px; top: 50%;
transform: translateY(-50%);
opacity: 0.4;
pointer-events: none;
}
.search-wrap input {
width: 100%;
padding: 0.62rem 0.9rem 0.62rem 2.4rem;
border: 1px solid var(--border);
border-radius: 10px;
font-family: 'DM Sans', sans-serif;
font-size: 0.88rem;
background: var(--white);
color: var(--text-dark);
outline: none;
transition: border-color 0.2s;
}
.search-wrap input:focus { border-color: var(--green-mid); }
select {
padding: 0.62rem 1rem;
border: 1px solid var(--border);
border-radius: 10px;
font-family: 'DM Sans', sans-serif;
font-size: 0.88rem;
background: var(--white);
color: var(--text-dark);
outline: none;
cursor: pointer;
transition: border-color 0.2s;
}
select:focus { border-color: var(--green-mid); }
.refresh-btn {
padding: 0.62rem 1.2rem;
border: 1px solid var(--border);
border-radius: 10px;
font-family: 'DM Sans', sans-serif;
font-size: 0.88rem;
background: var(--white);
color: var(--text-mid);
cursor: pointer;
display: flex; align-items: center; gap: 6px;
transition: background 0.2s, border-color 0.2s;
white-space: nowrap;
}
.refresh-btn:hover { background: var(--green-pale); border-color: var(--green-mid); }
.refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* TABLE */
.table-card {
background: var(--white);
border: 1px solid var(--border);
border-radius: 16px;
overflow: hidden;
box-shadow: var(--shadow);
animation: fadeUp 0.7s ease both;
}
.table-scroll { overflow-x: auto; }
table {
width: 100%;
border-collapse: collapse;
font-size: 0.875rem;
}
thead tr {
background: var(--green-pale);
}
thead th {
padding: 0.85rem 1.1rem;
text-align: left;
font-size: 0.72rem;
font-weight: 500;
letter-spacing: 0.07em;
text-transform: uppercase;
color: var(--text-mid);
cursor: pointer;
user-select: none;
white-space: nowrap;
border-bottom: 1px solid var(--border);
transition: color 0.15s;
}
thead th:hover { color: var(--green-deep); }
.sort-icon { display: inline-block; margin-left: 4px; opacity: 0.3; transition: opacity 0.15s; }
thead th.active .sort-icon { opacity: 1; color: var(--green-mid); }
tbody tr {
border-bottom: 1px solid rgba(208,232,216,0.5);
transition: background 0.12s;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--green-mist); }
tbody td {
padding: 0.9rem 1.1rem;
color: var(--text-dark);
vertical-align: middle;
}
.row-num { color: var(--text-soft); font-size: 0.78rem; width: 36px; }
.donor-name { font-weight: 500; }
.amount-cell {
font-family: 'Playfair Display', serif;
font-size: 1rem;
font-weight: 600;
color: var(--green-mid);
}
.date-cell { color: var(--text-mid); white-space: nowrap; }

/* PAYMENT BADGES */
.badge {
display: inline-flex; align-items: center; gap: 5px;
padding: 3px 10px;
border-radius: 20px;
font-size: 0.75rem;
font-weight: 500;
white-space: nowrap;
}
.badge-dot { width: 6px; height: 6px; border-radius: 50%; }
.badge-cash { background: #e8f7ef; color: #1a7a4a; }
.badge-cash .badge-dot { background: #2fb370; }
.badge-gcash { background: #e8f0fb; color: #1a4a8a; }
.badge-gcash .badge-dot { background: #3670dd; }
.badge-bank { background: #fdf3e0; color: #8a5a10; }
.badge-bank .badge-dot { background: #c8962a; }
.badge-other { background: #f2f2f2; color: #555; }
.badge-other .badge-dot { background: #aaa; }

/* EMPTY / LOADING */
.state-row td {
padding: 3rem;
text-align: center;
color: var(--text-soft);
font-size: 0.9rem;
}
.state-icon { font-size: 2rem; margin-bottom: 0.5rem; display: block; }

/* FOOTER BAR */
.table-footer {
display: flex;
align-items: center;
justify-content: space-between;
flex-wrap: wrap;
gap: 0.5rem;
padding: 0.85rem 1.1rem;
border-top: 1px solid var(--border);
background: var(--green-mist);
font-size: 0.8rem;
color: var(--text-soft);
}
.pagination { display: flex; gap: 4px; }
.pg-btn {
padding: 4px 10px;
border: 1px solid var(--border);
border-radius: 7px;
background: var(--white);
color: var(--text-mid);
font-size: 0.8rem;
cursor: pointer;
font-family: 'DM Sans', sans-serif;
transition: background 0.15s, border-color 0.15s;
}
.pg-btn:hover:not(:disabled) { background: var(--green-pale); border-color: var(--green-mid); }
.pg-btn:disabled { opacity: 0.35; cursor: default; }
.pg-btn.active { background: var(--green-deep); color: var(--white); border-color: var(--green-deep); }

/* ANIMATIONS */
@keyframes fadeUp {
from { opacity: 0; transform: translateY(16px); }
to { opacity: 1; transform: translateY(0); }
}

/* LAST UPDATED */
.last-updated {
text-align: right;
font-size: 0.75rem;
color: var(--text-soft);
margin-bottom: 0.75rem;
}

@media (max-width: 600px) {
.hero { padding: 2rem 1rem 1.75rem; }
.container { padding: 1.25rem 1rem; }
.stat-value { font-size: 1.5rem; }
}
</style>
</head>
<body>

<header class="hero">
<div class="hero-icon">🌸</div>
<h1>Ambag of Hope</h1>
<p>Donation Records</p>
<div class="hero-divider"></div>
</header>

<main class="container">

<!-- STATS -->
<div class="stats-grid" id="stats-grid">
<div class="stat-card highlight">
<div class="stat-label">Total Raised</div>
<div class="stat-value" id="s-total">—</div>
</div>
<div class="stat-card">
<div class="stat-label">Total Donors</div>
<div class="stat-value" id="s-count">—</div>
</div>
<div class="stat-card">
<div class="stat-label">This Month</div>
<div class="stat-value" id="s-month">—</div>
</div>
<div class="stat-card">
<div class="stat-label">Average Gift</div>
<div class="stat-value" id="s-avg">—</div>
</div>
</div>

<!-- CONTROLS -->
<div class="controls-bar">
<div class="search-wrap">
<svg width="15" height="15" viewBox="0 0 15 15" fill="none">
<circle cx="6.5" cy="6.5" r="5" stroke="#3a5542" stroke-width="1.5"/>
<path d="M10.5 10.5L13.5 13.5" stroke="#3a5542" stroke-width="1.5" stroke-linecap="round"/>
</svg>
<input type="text" id="search" placeholder="Search donor or method…" oninput="applyFilters()" />
</div>
<select id="method-filter" onchange="applyFilters()">
<option value="">All methods</option>
<option>Cash</option>
<option>GCash</option>
<option>Bank Transfer</option>
<option>Other</option>
</select>
<select id="sort-select" onchange="applyFilters()">
<option value="date-desc">Newest first</option>
<option value="date-asc">Oldest first</option>
<option value="amount-desc">Highest amount</option>
<option value="amount-asc">Lowest amount</option>
<option value="donor-asc">Donor A–Z</option>
</select>
<button class="refresh-btn" id="refresh-btn" onclick="fetchData()">
<svg width="13" height="13" viewBox="0 0 13 13" fill="none">
<path d="M11.5 2A6 6 0 1 0 12 6.5" stroke="#3a5542" stroke-width="1.5" stroke-linecap="round"/>
<path d="M12 2V5.5H8.5" stroke="#3a5542" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
Refresh
</button>
</div>

<div class="last-updated" id="last-updated"></div>

<!-- TABLE -->
<div class="table-card">
<div class="table-scroll">
<table>
<thead>
<tr>
<th class="row-num">#</th>
<th onclick="colSort('date')" id="h-date">Date <span class="sort-icon">↕</span></th>
<th onclick="colSort('donor')" id="h-donor">Donor Name <span class="sort-icon">↕</span></th>
<th onclick="colSort('amount')" id="h-amount">Amount <span class="sort-icon">↕</span></th>
<th>Payment Method</th>
</tr>
</thead>
<tbody id="tbody">
<tr class="state-row"><td colspan="5"><span class="state-icon">⏳</span>Loading donation records…</td></tr>
</tbody>
</table>
</div>
<div class="table-footer">
<span id="footer-info">—</span>
<div class="pagination" id="pagination"></div>
</div>
</div>

</main>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQQLgrgkNTy1cvEBUtlHEQpvVDnBUeEauI5D-1aV-CCOxqWNAcfj8ZUUeNDMhHGzqCgF5n43U4kvSgz/pub?gid=2116471734&single=true&output=csv';

let allRows = [];
let filtered = [];
let sortCol = 'date';
let sortDir = -1;
let page = 1;
const PER_PAGE = 20;

function parseCsv(text) {
const lines = text.trim().split(/\r?\n/);
return lines.map(line => {
const cells = [];
let cur = '', inQ = false;
for (let ch of line) {
if (ch === '"') { inQ = !inQ; }
else if (ch === ',' && !inQ) { cells.push(cur.trim()); cur = ''; }
else { cur += ch; }
}
cells.push(cur.trim());
return cells;
});
}

function normalize(rows) {
if (!rows.length) return [];
const hdr = rows[0].map(h => h.toLowerCase().replace(/\s+/g,''));
const idx = key => hdr.findIndex(h => h.includes(key));
const di = idx('date');
const ni = idx('donor') !== -1 ? idx('donor') : idx('name');
const ai = idx('amount');
const mi = idx('method') !== -1 ? idx('method') : idx('payment');
return rows.slice(1).filter(r => r.some(c => c.trim())).map((r, i) => ({
_i: i,
date: di >= 0 ? (r[di]||'').trim() : '',
donor: ni >= 0 ? (r[ni]||'').trim() : '',
amount: ai >= 0 ? parseFloat((r[ai]||'0').replace(/[^0-9.]/g,'')) || 0 : 0,
method: mi >= 0 ? (r[mi]||'').trim() : ''
}));
}

async function fetchData() {
const btn = document.getElementById('refresh-btn');
btn.classList.add('spinning');
document.getElementById('tbody').innerHTML = '<tr class="state-row"><td colspan="5"><span class="state-icon">⏳</span>Fetching latest records…</td></tr>';
try {
const res = await fetch(CSV_URL + '&t=' + Date.now());
const text = await res.text();
allRows = normalize(parseCsv(text));
if (!allRows.length) throw new Error('empty');
updateStats();
applyFilters();
const now = new Date();
document.getElementById('last-updated').textContent =
'Last updated: ' + now.toLocaleDateString('en-PH', {year:'numeric',month:'long',day:'numeric'}) +
' at ' + now.toLocaleTimeString('en-PH', {hour:'2-digit',minute:'2-digit'});
} catch(e) {
document.getElementById('tbody').innerHTML =
'<tr class="state-row"><td colspan="5"><span class="state-icon">⚠️</span>Could not load data. Check your internet connection and try refreshing.</td></tr>';
}
btn.classList.remove('spinning');
}

function updateStats() {
const total = allRows.reduce((s, r) => s + r.amount, 0);
const count = allRows.length;
const now = new Date();
const monthTotal = allRows.filter(r => {
const d = new Date(r.date);
return !isNaN(d) && d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
}).reduce((s, r) => s + r.amount, 0);
const avg = count ? total / count : 0;
const fmt = n => '₱' + Math.round(n).toLocaleString('en-PH');
document.getElementById('s-total').textContent = fmt(total);
document.getElementById('s-count').textContent = count.toLocaleString();
document.getElementById('s-month').textContent = fmt(monthTotal);
document.getElementById('s-avg').textContent = fmt(avg);
}

function applyFilters() {
const q = document.getElementById('search').value.toLowerCase();
const mf = document.getElementById('method-filter').value.toLowerCase();
const sv = document.getElementById('sort-select').value;

filtered = allRows.filter(r => {
const text = (r.donor + r.method + r.date).toLowerCase();
return (!q || text.includes(q)) && (!mf || r.method.toLowerCase().includes(mf));
});

const [sc, sd] = sv.split('-');
filtered.sort((a, b) => {
let va = a[sc], vb = b[sc];
if (sc === 'amount') return sd === 'desc' ? vb - va : va - vb;
if (sc === 'date') {
const da = new Date(va) || va, db = new Date(vb) || vb;
return sd === 'desc' ? db - da : da - db;
}
return sd === 'desc' ? String(vb).localeCompare(String(va)) : String(va).localeCompare(String(vb));
});

page = 1;
renderTable();
}

function colSort(col) {
const sv = document.getElementById('sort-select');
const cur = sv.value;
const [cc, cd] = cur.split('-');
const nd = (cc === col && cd === 'asc') ? 'desc' : 'asc';
const optVal = col + '-' + nd;
for (let o of sv.options) { if (o.value === optVal) { sv.value = optVal; break; } }
applyFilters();
}

function badgeClass(m) {
const ml = (m||'').toLowerCase();
if (ml.includes('gcash')) return 'badge-gcash';
if (ml.includes('cash')) return 'badge-cash';
if (ml.includes('bank') || ml.includes('transfer')) return 'badge-bank';
return 'badge-other';
}

function formatDate(d) {
if (!d) return '—';
const dt = new Date(d);
if (isNaN(dt)) return d;
return dt.toLocaleDateString('en-PH', {year:'numeric', month:'short', day:'numeric'});
}

function renderTable() {
const total = filtered.length;
const totalPages = Math.max(1, Math.ceil(total / PER_PAGE));
page = Math.min(page, totalPages);
const slice = filtered.slice((page-1)*PER_PAGE, page*PER_PAGE);
const tbody = document.getElementById('tbody');

if (!total) {
tbody.innerHTML = '<tr class="state-row"><td colspan="5"><span class="state-icon">🔍</span>No records match your search.</td></tr>';
} else {
tbody.innerHTML = slice.map((r, i) => `
<tr>
<td class="row-num">${(page-1)*PER_PAGE+i+1}</td>
<td class="date-cell">${formatDate(r.date)}</td>
<td class="donor-name">${r.donor || '—'}</td>
<td class="amount-cell">₱${r.amount.toLocaleString('en-PH', {minimumFractionDigits:0,maximumFractionDigits:0})}</td>
<td><span class="badge ${badgeClass(r.method)}"><span class="badge-dot"></span>${r.method || '—'}</span></td>
</tr>`).join('');
}

document.getElementById('footer-info').textContent =
total ? `Showing ${(page-1)*PER_PAGE+1}–${Math.min(page*PER_PAGE,total)} of ${total} record${total!==1?'s':''}` : '0 records';

const pg = document.getElementById('pagination');
if (totalPages <= 1) { pg.innerHTML = ''; return; }
let html = `<button class="pg-btn" onclick="goPage(${page-1})" ${page===1?'disabled':''}>‹</button>`;
for (let p2=1; p2<=totalPages; p2++) {
if (p2===1||p2===totalPages||Math.abs(p2-page)<=1) {
html += `<button class="pg-btn${p2===page?' active':''}" onclick="goPage(${p2})">${p2}</button>`;
} else if (Math.abs(p2-page)===2) html += '<span style="padding:4px 2px;color:#7a9e88">…</span>';
}
html += `<button class="pg-btn" onclick="goPage(${page+1})" ${page===totalPages?'disabled':''}>›</button>`;
pg.innerHTML = html;
}

function goPage(p) { page = p; renderTable(); window.scrollTo({top:0,behavior:'smooth'}); }

fetchData();
</script>
</body>
</html>
